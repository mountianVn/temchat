[phases.setup]
command = '''
echo "Setting up TeamChat..."
'''

[phases.build]
command = '''
echo "=== TeamChat Build ==="
echo "Installing server dependencies..."
cd server && npm install
echo "Installing client dependencies..."
cd ../client && npm install
echo "Building client..."
npm run build
echo "=== Build Complete ==="
'''

[start]
command = "cd server && npm start"
